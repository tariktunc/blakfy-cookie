name: test

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Cache esbuild output
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.cache
            dist
          key: ${{ runner.os }}-esbuild-${{ matrix.node }}-${{ hashFiles('package-lock.json', 'scripts/build.js') }}
          restore-keys: |
            ${{ runner.os }}-esbuild-${{ matrix.node }}-

      - name: Install dependencies
        run: npm ci

      - name: Run tests (Vitest)
        run: npm run test

      - name: Build (esbuild)
        run: npm run build

      - name: Bundle size budget
        run: npm run size

      - name: Build cookie-next (tsup)
        run: npm run build:next

      - name: Test cookie-next
        run: npm -w @blakfy/cookie-next test --if-present

  examples-nextjs:
    name: examples/nextjs build (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        node: ['20']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install root deps
        run: npm ci

      - name: Build cookie-next (peer for example)
        run: npm run build:next

      - name: Install Next.js example deps
        working-directory: examples/nextjs
        run: npm install --no-audit --no-fund

      - name: Build Next.js example (App Router)
        working-directory: examples/nextjs
        run: npm run build
