name: test

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Cache esbuild output
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.cache
            dist
          key: ${{ runner.os }}-esbuild-${{ matrix.node }}-${{ hashFiles('package-lock.json', 'scripts/build.js') }}
          restore-keys: |
            ${{ runner.os }}-esbuild-${{ matrix.node }}-

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Run tests with coverage (Vitest)
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: matrix.node == '20'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Build (esbuild)
        run: npm run build

      - name: Bundle size budget
        run: npm run size

      - name: Build cookie-next (tsup)
        run: npm run build:next

      - name: Test cookie-next
        run: npm -w @blakfy/cookie-next test --if-present

      # NOTE: examples/nextjs build CI'sı henüz aktif değil.
      # Sebep: examples/nextjs root workspace'in dışında, file:../../packages/cookie-next
      # link'i pack/install zincirinde Webpack resolution'a düzgün ulaşmıyor.
      # Çözüm yolu (Faz 4): root package.json workspaces'e "examples/nextjs" ekle
      # ve cookie-next dist build'i workspace install'dan ÖNCE yapacak şekilde script düzenle.
