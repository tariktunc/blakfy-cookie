version: 2
updates:
  # Root package — vanilla widget devDeps
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Istanbul"
    open-pull-requests-limit: 5
    groups:
      dev-deps:
        dependency-type: "development"
        update-types: ["minor", "patch"]
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # cookie-next workspace
  - package-ecosystem: "npm"
    directory: "/packages/cookie-next"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Istanbul"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "cookie-next"
    commit-message:
      prefix: "chore(deps,cookie-next)"
      include: "scope"

  # Next.js example app
  - package-ecosystem: "npm"
    directory: "/examples/nextjs"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "examples"
    commit-message:
      prefix: "chore(deps,examples)"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "ci"
    commit-message:
      prefix: "chore(ci)"
